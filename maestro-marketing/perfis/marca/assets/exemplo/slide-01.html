<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;overflow:hidden;background:linear-gradient(135deg, #1a1a2e 0%, #10101d 100%);color:#ffffff;
  font-family:'Inter',sans-serif;display:flex;flex-direction:column;justify-content:center;padding:90px;}
.kicker{font-size:28px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#e94560;}
.hook{font-family:'Inter',sans-serif;font-size:70px;font-weight:700;line-height:1.18;margin-top:24px;}
.hook .accent{color:#e94560;}
.sub{font-size:34px;font-weight:500;line-height:1.5;color:rgba(255,255,255,0.62);margin-top:30px;max-width:840px;}
.footer{position:absolute;bottom:64px;left:90px;font-size:24px;font-weight:500;color:rgba(255,255,255,0.62);}
</style></head><body>
<span class="kicker">CATEGORIA</span>
<h1 class="hook">Seu gancho aqui, com uma <span class="accent">palavra</span> em destaque.</h1>
<p class="sub">Subtítulo de apoio na voz da marca.</p>
<span class="footer">@marca</span>
</body></html>
