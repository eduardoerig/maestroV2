<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width:1080px; height:1080px; overflow:hidden;
      font-family:'Montserrat',sans-serif;
      background:linear-gradient(135deg,#0E2E3C 0%,#081320 100%);
      color:#FFFFFF;
      display:flex; flex-direction:column; align-items:center; justify-content:space-between;
      padding:64px;
    }

    /* Moldura fixa: crop marks nos 4 cantos */
    .crop { position:absolute; width:34px; height:34px; }
    .crop.tl { top:54px; left:54px; border-top:2px solid rgba(25,163,232,.5); border-left:2px solid rgba(25,163,232,.5); }
    .crop.tr { top:54px; right:54px; border-top:2px solid rgba(25,163,232,.5); border-right:2px solid rgba(25,163,232,.5); }
    .crop.bl { bottom:54px; left:54px; border-bottom:2px solid rgba(25,163,232,.5); border-left:2px solid rgba(25,163,232,.5); }
    .crop.br { bottom:54px; right:54px; border-bottom:2px solid rgba(25,163,232,.5); border-right:2px solid rgba(25,163,232,.5); }

    .selo { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:26px; letter-spacing:.5em; color:#19A3E8; text-transform:none; padding-left:.5em; }

    .mid { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; flex:1; width:100%; }
    .kicker { font-family:'JetBrains Mono',monospace; font-weight:500; font-size:28px; color:#19A3E8; letter-spacing:.06em; margin-bottom:26px; }
    .manchete { font-weight:900; font-size:70px; line-height:1.06; text-transform:uppercase; letter-spacing:-.01em; max-width:900px; }
    .regua { width:120px; height:5px; background:#19A3E8; margin:38px 0 30px; }
    .hero { font-family:'Anton',sans-serif; font-size:280px; line-height:.9; color:#D43A1E; letter-spacing:.01em; }

    .bar-wrap { width:620px; height:34px; background:rgba(91,122,140,.28); border-radius:6px; margin:26px 0 34px; overflow:hidden; display:flex; }
    .bar-fill { width:53%; height:100%; background:#D43A1E; border-radius:6px 0 0 6px; }

    .apoio { font-weight:700; font-size:34px; line-height:1.4; color:#FFFFFF; max-width:820px; }

    .foot { display:flex; flex-direction:column; align-items:center; width:100%; }
    .swipe { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:26px; color:#F4C20D; letter-spacing:.1em; margin-bottom:16px; }
    .meta { font-family:'JetBrains Mono',monospace; font-weight:500; font-size:24px; color:#5B7A8C; letter-spacing:.04em; }
  </style>
</head>
<body>
  <span class="crop tl"></span><span class="crop tr"></span><span class="crop bl"></span><span class="crop br"></span>

  <div class="selo">‹ primodev ›</div>

  <div class="mid">
    <div class="kicker">// web performance</div>
    <h1 class="manchete">Seu site não é lento. Ele é caro.</h1>
    <div class="regua"></div>
    <div class="hero">53%</div>
    <div class="bar-wrap"><div class="bar-fill"></div></div>
    <p class="apoio">abandonam o site que demora mais de 3 segundos pra abrir. Metade de quem você pagou pra atrair some antes de ver o que você vende.</p>
  </div>

  <div class="foot">
    <div class="swipe">arrasta →</div>
    <div class="meta">web performance · fonte: Portent / Deloitte</div>
  </div>
</body>
</html>
