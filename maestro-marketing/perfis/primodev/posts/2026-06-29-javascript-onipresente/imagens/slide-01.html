<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:1080px;height:1080px;overflow:hidden;position:relative;font-family:'Montserrat',sans-serif;color:#F3F7F8;
    background:linear-gradient(165deg,#0E2E3C 0%,#07131F 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 130px;}
  .cm{position:absolute;width:30px;height:30px;border:0 solid rgba(25,163,232,.5);}
  .tl{top:54px;left:54px;border-top-width:2px;border-left-width:2px;}
  .tr{top:54px;right:54px;border-top-width:2px;border-right-width:2px;}
  .bl{bottom:54px;left:54px;border-bottom-width:2px;border-left-width:2px;}
  .br{bottom:54px;right:54px;border-bottom-width:2px;border-right-width:2px;}
  .seal{position:absolute;top:70px;left:0;right:0;font-family:'JetBrains Mono';font-weight:700;font-size:22px;letter-spacing:7px;color:#19A3E8;}
  .kicker{font-family:'JetBrains Mono';font-weight:500;font-size:24px;letter-spacing:3px;color:#7Fb3c9;margin-bottom:34px;}
  .hook{font-family:'Anton';font-size:104px;line-height:.97;letter-spacing:1px;text-transform:uppercase;}
  .hook .cy{color:#19A3E8;}
  .rule{width:64px;height:2px;background:#19A3E8;margin:42px 0;opacity:.85;}
  .stat{font-family:'JetBrains Mono';font-weight:400;font-size:27px;letter-spacing:1px;color:#A9c2cd;}
  .stat b{font-family:'Anton';font-weight:400;font-size:40px;color:#F3F7F8;letter-spacing:1px;vertical-align:-3px;margin-right:8px;}
  .swipe{position:absolute;bottom:96px;left:0;right:0;font-family:'JetBrains Mono';font-weight:500;font-size:22px;letter-spacing:4px;color:#F4C20D;text-transform:uppercase;}
  .meta{position:absolute;bottom:58px;left:0;right:0;font-family:'JetBrains Mono';font-size:18px;letter-spacing:3px;color:#52707d;}
</style>
</head>
<body>
  <span class="cm tl"></span><span class="cm tr"></span><span class="cm bl"></span><span class="cm br"></span>
  <div class="seal">&#8249; primodev &#8250;</div>
  <div class="kicker">// a web em 2026</div>
  <h1 class="hook">O JavaScript<br><span class="cy">dominou</span> a web</h1>
  <div class="rule"></div>
  <div class="stat"><b>98,7%</b> dos sites rodam javascript</div>
  <div class="swipe">arrasta &rarr;</div>
  <div class="meta">web performance &middot; fonte: web almanac</div>
</body>
</html>
