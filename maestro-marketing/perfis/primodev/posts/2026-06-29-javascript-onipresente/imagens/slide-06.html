<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:1080px;height:1080px;overflow:hidden;position:relative;font-family:'Montserrat',sans-serif;color:#F3F7F8;
    background:linear-gradient(165deg,#0E2E3C 0%,#07131F 100%);
    display:flex;flex-direction:column;justify-content:center;padding:0 130px;}
  .cm{position:absolute;width:30px;height:30px;border:0 solid rgba(25,163,232,.5);}
  .tl{top:54px;left:54px;border-top-width:2px;border-left-width:2px;}
  .tr{top:54px;right:54px;border-top-width:2px;border-right-width:2px;}
  .bl{bottom:54px;left:54px;border-bottom-width:2px;border-left-width:2px;}
  .br{bottom:54px;right:54px;border-bottom-width:2px;border-right-width:2px;}
  .seal{position:absolute;top:70px;left:0;right:0;text-align:center;font-family:'JetBrains Mono';font-weight:700;font-size:22px;letter-spacing:7px;color:#19A3E8;}
  .kicker{font-family:'JetBrains Mono';font-weight:500;font-size:24px;letter-spacing:3px;color:#5BA86F;margin-bottom:28px;}
  .title{font-family:'Anton';font-size:88px;line-height:.98;letter-spacing:1px;text-transform:uppercase;}
  .title .gr{color:#2FA84F;}
  .sub{font-size:31px;font-weight:600;line-height:1.42;color:#cfe0e8;margin-top:40px;max-width:840px;}
  .sub .gr{color:#3FBE63;}
  .cta{display:inline-flex;align-items:center;gap:12px;align-self:flex-start;margin-top:54px;
    border:2px solid #F4C20D;color:#F4C20D;font-family:'JetBrains Mono';font-weight:700;font-size:28px;
    letter-spacing:3px;text-transform:uppercase;padding:18px 38px;border-radius:8px;}
  .meta{position:absolute;bottom:58px;left:0;right:0;text-align:center;font-family:'JetBrains Mono';font-size:18px;letter-spacing:3px;color:#52707d;}
</style>
</head>
<body>
  <span class="cm tl"></span><span class="cm tr"></span><span class="cm bl"></span><span class="cm br"></span>
  <div class="seal">&#8249; primodev &#8250;</div>
  <div class="kicker">// e a primodev nisso?</div>
  <h1 class="title">O problema n&atilde;o &eacute; o JS.<br><span class="gr">&Eacute; o exagero.</span></h1>
  <p class="sub">A gente constr&oacute;i <span class="gr">r&aacute;pido, leve e est&aacute;vel</span>: s&oacute; o c&oacute;digo que a p&aacute;gina usa. &Eacute; o que separa um site que vende de um site que trava.</p>
  <div class="cta">chama no direct &rarr;</div>
  <div class="meta">primodev &middot; tecnologia que vira resultado</div>
</body>
</html>
