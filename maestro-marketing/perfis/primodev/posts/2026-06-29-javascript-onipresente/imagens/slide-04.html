<!DOCTYPE html>
<html lang="pt-BR">
<head>

<style>

  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:1080px;height:1080px;overflow:hidden;position:relative;font-family:'Montserrat',sans-serif;color:#F3F7F8;
    background:linear-gradient(165deg,#0E2E3C 0%,#07131F 100%);
    display:flex;flex-direction:column;justify-content:center;padding:0 130px;}
  .cm{position:absolute;width:30px;height:30px;border:0 solid rgba(25,163,232,.5);}
  .tl{top:54px;left:54px;border-top-width:2px;border-left-width:2px;}
  .tr{top:54px;right:54px;border-top-width:2px;border-right-width:2px;}
  .bl{bottom:54px;left:54px;border-bottom-width:2px;border-left-width:2px;}
  .br{bottom:54px;right:54px;border-bottom-width:2px;border-right-width:2px;}
  .seal{position:absolute;top:70px;left:0;right:0;text-align:center;font-family:'JetBrains Mono';font-weight:700;font-size:22px;letter-spacing:7px;color:#19A3E8;}
  .kicker{font-family:'JetBrains Mono';font-weight:500;font-size:24px;letter-spacing:3px;color:#C8543B;margin-bottom:26px;}
  .title{font-family:'Montserrat';font-weight:800;font-size:54px;line-height:1.05;}
  .title .rd{color:#D43A1E;}
  .big{font-family:'Anton';font-size:210px;line-height:.84;color:#D43A1E;margin:14px 0 0;letter-spacing:2px;}
  .ind{display:flex;align-items:center;gap:14px;margin:34px 0 0;font-family:'JetBrains Mono';font-weight:500;font-size:22px;letter-spacing:2px;color:#90a8b3;}
  .dot{width:26px;height:26px;border-radius:6px;}
  .q{background:#D43A1E;}
  .ok{background:#234b5b;}
  .sub{font-size:29px;font-weight:500;line-height:1.4;color:#9fb6c0;margin-top:40px;max-width:860px;}
  .meta{position:absolute;bottom:58px;left:0;right:0;text-align:center;font-family:'JetBrains Mono';font-size:18px;letter-spacing:3px;color:#52707d;}
</style>
</head>
<body>
  <span class="cm tl"></span><span class="cm tr"></span><span class="cm bl"></span><span class="cm br"></span>
  <div class="seal">&#8249; primodev &#8250;</div>
  <div class="kicker">// a fragilidade</div>
  <h1 class="title">Tira o JS e a <span class="rd">web racha</span></h1>
  <div class="big">2/3</div>
  <div class="ind"><span class="dot q"></span><span class="dot q"></span><span class="dot ok"></span>&nbsp;dos sites quebram sem javascript</div>
  <p class="sub">Bloquear o JS derruba a funcionalidade de dois em cada tr&ecirc;s sites. Estudo com 100 mil p&aacute;ginas.</p>
  <div class="meta">resili&ecirc;ncia &middot; fonte: arxiv 2302.01182</div>
